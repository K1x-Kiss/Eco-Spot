spring.application.name=backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dev}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# create-drop / update
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET:EcoSpot2026SecretKeyForJWTTokenGen12345678901234567890123456789012345678901234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Static resources - serve images folder
spring.web.resources.static-locations=file:images/,classpath:static
spring.mvc.static-path-pattern=/images/**
